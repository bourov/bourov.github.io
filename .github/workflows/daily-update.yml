name: Daily Briefing & Crash Dashboard

on:
  schedule:
    # 6:00 AM Central (CDT = UTC-5 in summer, CST = UTC-6 in winter).
    # 11:00 UTC covers CDT; the briefing timestamp is cosmetic only.
    - cron: "0 11 * * *"
  workflow_dispatch: {} # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate daily briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_daily_briefing.py

      - name: Update crash dashboard data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/update_crash_data.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/index.html crash/crash_indicators_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update for $(date -u +%Y-%m-%d)"
            git push
          fi
